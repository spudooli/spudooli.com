
{% extends 'adminbase.html' %}

{% block header %}
<div class="container-page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h1 class="title-un">{% block title %}New Post{% endblock %}</h1>
        <div class="title-un-icon">
          <ion-icon name="pulse-outline"></ion-icon>
        </div>
        <p class="title-un-des">Make a new blog post, why don't you?           </p>

{% endblock %}

{% block content %}
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <form method="post" enctype="multipart/form-data">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">Title</label>
            <input name="title" class="form-control form-control-lg" id="title" value="{{ request.form['title'] }}" required>
          </div>

          <div class="mb-3">
            <label for="body" class="form-label fw-semibold">Body</label>
            <textarea name="body" class="form-control" id="body" style="height:400px;">{{ request.form['body'] }}</textarea>
          </div>

          <div class="mb-3">
            <label for="file" class="form-label fw-semibold">Image</label>
            <input type="file" class="form-control" name="file" id="file">
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="photolatlon" class="form-label fw-semibold">Photo location (lat, lon)</label>
              <input class="form-control" name="photolatlon" id="photolatlon" value="{{ request.form['photolatlon'] }}" placeholder="e.g. -36.8485, 174.7633">
            </div>
            <div class="col-md-6">
              <label for="alttext" class="form-label fw-semibold">Alt text for image</label>
              <input class="form-control" name="alttext" id="alttext" value="{{ request.form['alttext'] }}">
            </div>
          </div>

          <div class="mb-4">
            <input type="submit" class="btn btn-primary btn-lg" value="Save">
          </div>

        </form>
      </div>
    </div>
  </div>

          <!-- Close divs -->
        </div>
      </div>
    </div>
  </div>

  
{% endblock %}
